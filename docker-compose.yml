version: '3.8'

services:
  # Database Service
  postgres:
    image: postgres:15-alpine
    container_name: mcms-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-meal_coupon_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-meal_coupon_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mcms-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password_123}@postgres:5432/${POSTGRES_DB:-meal_coupon_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your_fallback_super_secret_jwt_key}
      JWT_EXPIRE: ${JWT_EXPIRE:-24h}
      CLIENT_URL: http://localhost:5173
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-en}
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # React Frontend (Development / Dev preview mode for Docker)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mcms-frontend
    restart: always
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
      VITE_DEFAULT_LANGUAGE: ${VITE_DEFAULT_LANGUAGE:-en}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
    driver: local
