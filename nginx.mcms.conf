# ==============================================================================
# MCMS NGINX CONFIGURATION FOR UBUNTU VPS
# ==============================================================================
# File Location on VPS: /etc/nginx/sites-available/mcms
# Symlinked to: /etc/nginx/sites-enabled/mcms
# (Remember to disable the default Nginx config: rm /etc/nginx/sites-enabled/default)

server {
    listen 80;
    listen [::]:80;
    
    # Replace with your actual domain name or server IP address
    server_name your-domain-or-ip.com;

    # Root directory pointing to the compiled React frontend dist folder
    # Assuming the repository is cloned in /var/www/mcms
    root /var/www/mcms/frontend/dist;
    index index.html;

    # Client-side log configurations
    access_log /var/log/nginx/mcms_access.log;
    error_log /var/log/nginx/mcms_error.log;

    # Gzip Compression for maximum loading speed
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    # Frontend Routing: fallback to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static Assets Caching (JS, CSS, Images, Fonts)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15778463, immutable";
    }

    # Backend Express REST API reverse proxy
    location /api/ {
        # Forward requests to Node.js backend port 5000
        proxy_pass http://127.0.0.1:5000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # IP forwarding headers for express auditing and rate-limiting
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
